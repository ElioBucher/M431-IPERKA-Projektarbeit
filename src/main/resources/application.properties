quarkus.application.name=class-hub
quarkus.http.port=8080

# ── JWT ──────────────────────────────────────────────────────────────
# Schlüssel aus dem Login-Projekt übernehmen (privateKey.pem / publicKey.pem)
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://bbzw.ch
smallrye.jwt.sign.key.location=privateKey.pem
quarkus.smallrye-jwt.enabled=true
app.jwt.expiry-seconds=3600

# ── SQLite ────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
# Use WAL journal mode and a busy timeout to reduce SQLITE_BUSY errors during concurrent access
# The SQLite JDBC driver accepts PRAGMA settings via the JDBC URL query parameters.
quarkus.datasource.jdbc.url=jdbc:sqlite:db/class.db?journal_mode=DELETE&busy_timeout=5000
# Reduce pool concurrency for SQLite (single writer). This serializes DB writes and avoids
# SQLITE_BUSY errors in development when multiple threads try to write concurrently.
quarkus.datasource.jdbc.max-size=4
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.initial-size=2
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
# update = Tabellen nur anlegen wenn nicht vorhanden, nie löschen
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# ── CORS ──────────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type
