<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KlassenHub – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117; --surface: #181c27; --border: #2a3050;
      --accent: #4f7cff; --text: #dde3f5; --text-muted: #7880a4;
      --radius: 10px; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-body);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .sub  { color: var(--text-muted); font-size: .9rem; margin-bottom: 28px; }
    label { display: flex; flex-direction: column; gap: 5px; font-size: .83rem;
            font-weight: 500; color: var(--text-muted); margin-bottom: 14px; }
    input {
      background: #1e2336; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font-body); font-size: .95rem;
      padding: 11px 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); font-family: var(--font-display); font-size: 1rem;
      font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity .15s;
    }
    button:hover { opacity: .88; }
    .error { color: #e05260; font-size: .85rem; margin-top: 10px; min-height: 20px; }

    /* ======================================================
       ELIO – Anleitung für das Backend-Login
       ======================================================
       1. Formular absenden → POST /api/auth/login
          Body: { "className": "IB2024a", "password": "geheim" }

       2. Bei Erfolg gibt das Backend zurück:
          { "classId": 42, "className": "IB2024a", "token": "eyJ..." }

       3. Dann diese drei Werte in sessionStorage setzen:
          sessionStorage.setItem('classId',   data.classId.toString());
          sessionStorage.setItem('className', data.className);
          sessionStorage.setItem('token',     data.token);   // falls JWT

       4. Danach weiterleiten:
          window.location.href = 'dashboard.html';

       Das Frontend liest diese Werte beim Start von dashboard.html.
       Fehlt classId → automatische Weiterleitung zurück zu index.html.
       ====================================================== */
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚 KlassenHub</div>
    <p class="sub">Mit deinem Klassen-Login anmelden</p>

    <label>Klasse
      <input type="text" id="input-class" placeholder="z.B. IB2024a" autocomplete="username" />
    </label>
    <label>Passwort
      <input type="password" id="input-password" placeholder="Klassen-Passwort" autocomplete="current-password" />
    </label>
    <button id="btn-login">Anmelden</button>
    <div class="error" id="error-msg"></div>
  </div>

  <script>
    /* ── LOGIN-LOGIK (Elio ergänzt hier den echten API-Aufruf) ── */
    document.getElementById('btn-login').addEventListener('click', handleLogin);
    document.getElementById('input-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const className = document.getElementById('input-class').value.trim();
      const password  = document.getElementById('input-password').value;
      const errorEl   = document.getElementById('error-msg');
      errorEl.textContent = '';

      if (!className || !password) {
        errorEl.textContent = 'Bitte Klasse und Passwort eingeben.';
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ className, password })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          errorEl.textContent = err.message || 'Falscher Klassen-Name oder Passwort.';
          return;
        }

        const data = await res.json();

        // ── Diese drei Werte werden vom dashboard.html erwartet ──
        sessionStorage.setItem('classId',   String(data.classId));
        sessionStorage.setItem('className', data.className);
        if (data.token) sessionStorage.setItem('token', data.token);

        window.location.href = 'dashboard.html';

      } catch (e) {
        errorEl.textContent = 'Verbindung zum Server fehlgeschlagen.';
      }
    }
  </script>
</body>
</html>
