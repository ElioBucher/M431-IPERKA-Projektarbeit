<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KlassenHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-login">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-logo-text">KlassenHub</span>
      </div>
      <p class="login-sub">Mit deinem Klassen-Login anmelden</p>

      <div class="field-group">
        <label class="field-label" for="input-class">Klasse</label>
        <input class="field-input" type="text" id="input-class" placeholder="z.B. AP26a" autocomplete="username" />
      </div>
      <div class="field-group">
        <label class="field-label" for="input-password">Passwort</label>
        <input class="field-input" type="password" id="input-password" placeholder="Passwort eingeben" autocomplete="current-password" />
      </div>

      <button class="btn-fill" id="btn-login">Anmelden</button>
      <button class="btn-outline" id="btn-open-register">Noch kein Konto? Registrieren</button>

      <p class="error" id="error-msg"></p>
    </div>
  </div>

  <!-- Register Modal -->
  <div class="modal-overlay" id="modal-register">
    <div class="modal">
      <h3>Neue Klasse registrieren</h3>
      <div class="field-group">
        <label class="field-label" for="reg-class">Klassenname</label>
        <input class="field-input" type="text" id="reg-class" placeholder="z.B. AP26a" />
      </div>
      <div class="field-group">
        <label class="field-label" for="reg-pass">Passwort</label>
        <input class="field-input" type="password" id="reg-pass" placeholder="Mindestens 6 Zeichen" />
      </div>
      <div class="field-group">
        <label class="field-label" for="reg-pass2">Passwort wiederholen</label>
        <input class="field-input" type="password" id="reg-pass2" placeholder="Passwort bestätigen" />
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="reg-cancel">Abbrechen</button>
        <button class="btn-primary" id="reg-submit">Registrieren</button>
      </div>
      <p class="error" id="reg-error"></p>
    </div>
  </div>

  <script>
    function openRegister()  { document.getElementById('modal-register').classList.add('open'); }
    function closeRegister() { document.getElementById('modal-register').classList.remove('open'); }

    document.getElementById('btn-login').addEventListener('click', handleLogin);
    document.getElementById('btn-open-register').addEventListener('click', openRegister);
    document.getElementById('reg-cancel').addEventListener('click', closeRegister);
    document.getElementById('input-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('reg-pass2').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('reg-submit').click(); });

    async function handleLogin() {
      const username = document.getElementById('input-class').value.trim();
      const password = document.getElementById('input-password').value;
      const errorEl  = document.getElementById('error-msg');
      errorEl.textContent = '';
      if (!username || !password) { errorEl.textContent = 'Bitte Klasse und Passwort eingeben.'; return; }
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        if (!res.ok) { const err = await res.json().catch(() => ({})); errorEl.textContent = err.error || 'Falscher Klassen-Name oder Passwort.'; return; }
        const data = await res.json();
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('classId', String(data.classId));
        sessionStorage.setItem('className', data.className ?? username);
        window.location.href = 'dashboard.html';
      } catch { errorEl.textContent = 'Verbindung zum Server fehlgeschlagen.'; }
    }

    async function handleRegisterSubmit() {
      const className = document.getElementById('reg-class').value.trim();
      const pass      = document.getElementById('reg-pass').value;
      const pass2     = document.getElementById('reg-pass2').value;
      const errEl     = document.getElementById('reg-error');
      errEl.textContent = '';
      if (!className)             { errEl.textContent = 'Bitte Klassenname eingeben.'; return; }
      if (!pass || pass.length < 6) { errEl.textContent = 'Passwort muss mind. 6 Zeichen haben.'; return; }
      if (pass !== pass2)         { errEl.textContent = 'Passwörter stimmen nicht überein.'; return; }
      try {
        const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ className, password: pass }) });
        if (!res.ok) { const body = await res.json().catch(() => ({})); errEl.textContent = body.error || 'Registrierung fehlgeschlagen.'; return; }
        const data = await res.json();
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('classId', String(data.classId));
        sessionStorage.setItem('className', data.className ?? className);
        closeRegister();
        window.location.href = 'dashboard.html';
      } catch { errEl.textContent = 'Verbindung zum Server fehlgeschlagen.'; }
    }

    document.getElementById('reg-submit').addEventListener('click', handleRegisterSubmit);
  </script>
</body>
</html>
